name: Daily Digest Cron

on:
  schedule:
    - cron: "0 4 * * *" # 12:00 Asia/Taipei
  workflow_dispatch: {}

jobs:
  call-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Call digest endpoint
        env:
          DIGEST_URL: ${{ secrets.DIGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DIGEST_URL" ]; then
            echo "Missing DIGEST_URL secret"
            exit 1
          fi
          if [ -n "$CRON_SECRET" ]; then
            curl -sS -X POST "$DIGEST_URL" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: $CRON_SECRET" \
              -d '{"now":"'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"}'
          else
            curl -sS -X POST "$DIGEST_URL" \
              -H "Content-Type: application/json" \
              -d '{"now":"'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"}'
          fi
